spring:
  application:
    name: parlament-bot

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/Parlament}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: ${PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

bot:
  token: ${BOT_TOKEN}
  username: ${BOT_USERNAME}
  mode: ${BOT_MODE:long_polling}
  webhook:
    enabled: ${BOT_WEBHOOK_ENABLED:false}
    public-url: ${BOT_WEBHOOK_PUBLIC_URL:}
    path: ${BOT_WEBHOOK_PATH:/telegram/webhook}
  admin:
    ids: ${ADMIN_IDS:}        # comma-separated Telegram user IDs
    notify-on-order: true
    notify-on-new-user: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

logging:
  level:
    com.parlament: DEBUG
    org.telegram: WARN
    org.springframework.web: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
